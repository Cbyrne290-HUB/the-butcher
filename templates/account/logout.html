{% extends 'base.html' %}
{% block title %}Sign Out – The Butcher{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-5 col-md-7 text-center">
      <i class="bi bi-scissors display-5 text-warning mb-3"></i>
      <h1 class="fs-3 fw-bold mb-2">Sign Out</h1>
      <p class="text-muted mb-4">Are you sure you want to sign out of your account?</p>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger fw-bold px-5 me-2">
          <i class="bi bi-box-arrow-right me-1"></i>Yes, Sign Out
        </button>
        <a href="{% url 'home' %}" class="btn btn-outline-secondary px-5">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
